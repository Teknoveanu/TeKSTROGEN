<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeKK STORM RADIO | Underground Electronic Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --main-bg: #0e0e11;
            --accent: #ff0066;
            --text: #ffffff;
            --secondary-bg: #141418;
            --glitch-color: rgba(255, 0, 102, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: var(--main-bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        a { text-decoration: none; color: var(--text); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 5%; background-color: rgba(14, 14, 17, 0.9); position: fixed; width: 100%; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-size: 1.8rem; font-weight: bold; color: var(--accent); position: relative; overflow: hidden; }
        .logo::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, var(--glitch-color), transparent); animation: glitch 1.5s infinite; }
        @keyframes glitch { 0% { left: -100%; } 100% { left: 100%; } }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { position: relative; transition: all 0.3s ease; }
        .nav-links a:hover { color: var(--accent); }
        .nav-links a::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0; background-color: var(--accent); transition: width 0.3s ease; }
        .nav-links a:hover::after { width: 100%; }
        .lang-switcher { display: flex; gap: 0.5rem; align-items: center; }
        .lang-btn { padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; transition: all 0.3s ease; background: transparent; color: var(--text); border: 1px solid var(--text); }
        .lang-btn.active { background-color: var(--accent); border-color: var(--accent); }
        .mobile-menu-btn { display: none; font-size: 1.5rem; cursor: pointer; }
        header { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(14, 14, 17, 0.7), rgba(14, 14, 17, 0.9)), url('https://source.unsplash.com/random/1920x1080/?electronic,music,dj') no-repeat center center/cover; padding: 0 5%; position: relative; overflow: hidden; }
        header::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px); pointer-events: none; animation: scanline 8s linear infinite; }
        @keyframes scanline { 0% { background-position-y: 0; } 100% { background-position-y: 100vh; } }
        header h1 { font-size: 3.5rem; margin-bottom: 1rem; position: relative; display: inline-block; }
        header h1::before, header h1::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; clip: rect(0, 0, 0, 0); }
        header h1::before { left: -2px; text-shadow: 2px 0 var(--accent); animation: glitch-anim-1 2s infinite linear alternate-reverse; }
        header h1::after { left: 2px; text-shadow: -2px 0 #00b0ff; animation: glitch-anim-2 3s infinite linear alternate-reverse; }
        @keyframes glitch-anim-1 { 0% { clip: rect(36px, 9999px, 9px, 0); } 100% { clip: rect(36px, 9999px, 9px, 0); } }
        @keyframes glitch-anim-2 { 0% { clip: rect(93px, 9999px, 22px, 0); } 100% { clip: rect(93px, 9999px, 22px, 0); } }
        header p { font-size: 1.2rem; margin-bottom: 2rem; max-width: 800px; }
        .header-buttons a { margin: 0 0.5rem; padding: 0.7rem 1.5rem; background: var(--accent); color: var(--text); border-radius: 4px; font-weight: bold; transition: background 0.3s; }
        .header-buttons a:hover { background: #e00058; }
        .player-section { padding: 2rem 5%; background-color: rgba(20, 20, 24, 0.8); display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 2rem; position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); z-index: 10; }
        .player-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 10% 30%, rgba(140, 0, 255, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(0, 255, 200, 0.07) 0%, transparent 40%); pointer-events: none; }
        .player-container { display: flex; align-items: center; gap: 1.5rem; background-color: rgba(14, 14, 17, 0.75); padding: 1.5rem 2rem; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(255, 0, 102, 0.1); backdrop-filter: blur(5px); width: 100%; max-width: 900px; position: relative; }
        .play-btn { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(45deg, var(--accent), #aa0044); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s ease; border: none; color: var(--text); font-size: 1.2rem; box-shadow: 0 0 15px rgba(255, 0, 102, 0.4); }
        .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent); }
        .player-progress { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        .progress-bar { height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; position: relative; }
        .progress-filled { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #aa0044); border-radius: 2px; }
        .waveform { display: flex; align-items: center; gap: 3px; height: 20px; }
        .wave { flex: 1; height: 100%; background: rgba(255, 255, 255, 0.05); border-radius: 1px; animation: waveAnimation 1.5s infinite ease-in-out; }
        .wave:nth-child(1) { animation-delay: 0.2s; }
        .wave:nth-child(2) { animation-delay: 0.4s; }
        .wave:nth-child(3) { animation-delay: 0.1s; }
        .wave:nth-child(4) { animation-delay: 0.3s; }
        .wave:nth-child(5) { animation-delay: 0.5s; }
        @keyframes waveAnimation { 0%, 100% { height: 20%; } 50% { height: 80%; } }
        .volume-control { display: flex; align-items: center; gap: 0.8rem; margin-left: 1rem; }
        .volume-slider { -webkit-appearance: none; appearance: none; width: 80px; height: 4px; border-radius: 2px; background: rgba(255, 255, 255, 0.1); outline: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 5px var(--accent); }
        .now-playing { padding-left: 1.5rem; border-left: 1px solid rgba(255, 255, 255, 0.1); }
        .now-playing h3 { margin-bottom: 0.5rem; font-size: 1rem; opacity: 0.7; }
        .track-info { display: flex; flex-direction: column; gap: 0.3rem; }
        .track-info .show-name { color: var(--accent); font-weight: bold; }
        .track-info .track-title { font-weight: bold; }
        .track-info .track-artist { opacity: 0.8; font-size: 0.9rem; }
        .countdown-section { padding: 4rem 5%; text-align: center; }
        .countdown-section h2 { margin-bottom: 2rem; font-size: 2rem; }
        .countdown-container { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; }
        .countdown-item { display: flex; flex-direction: column; align-items: center; }
        .countdown-number { font-size: 2.5rem; font-weight: bold; background-color: rgba(255, 0, 102, 0.2); min-width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; border-radius: 8px; margin-bottom: 0.5rem; }
        .countdown-label { font-size: 0.9rem; text-transform: uppercase; }
        .event-details { margin-top: 2rem; }
        .event-details h3 { margin-bottom: 1rem; }
        .schedule-section { padding: 4rem 5%; text-align: center; }
        .schedule-section h2 { margin-bottom: 2rem; font-size: 2rem; }
        .programs-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-top: 3rem; text-align: left; }
        .program-card { background: rgba(20, 20, 24, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 1.5rem; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .program-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3); }
        .program-card h3 { color: var(--accent); margin-bottom: 0.5rem; font-size: 1.5rem; }
        .program-card p { margin-bottom: 1rem; opacity: 0.8; }
        .program-time { display: inline-block; padding: 0.3rem 0.8rem; background-color: rgba(255, 0, 102, 0.2); border-radius: 20px; margin-bottom: 1rem; font-size: 0.9rem; }
        .about-section { padding: 4rem 5%; background-color: var(--secondary-bg); }
        .about-container { display: flex; flex-wrap: wrap; gap: 3rem; align-items: center; }
        .about-image { flex: 1; min-width: 300px; }
        .about-image img { width: 100%; border-radius: 10px; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3); }
        .about-content { flex: 2; min-width: 300px; }
        .about-content h2 { margin-bottom: 1.5rem; font-size: 2rem; }
        .about-content p { margin-bottom: 1.5rem; }
        .contact-section { padding: 4rem 5%; }
        .contact-section h2 { text-align: center; margin-bottom: 2rem; font-size: 2rem; }
        .contact-container { display: flex; flex-wrap: wrap; gap: 3rem; }
        .contact-info { flex: 1; min-width: 300px; }
        .contact-info h3 { margin-bottom: 1.5rem; }
        .info-item { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem; }
        .info-item i { color: var(--accent); font-size: 1.2rem; margin-top: 0.3rem; }
        .contact-form { flex: 2; min-width: 300px; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.8rem; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px; background-color: rgba(20, 20, 24, 0.8); color: var(--text); }
        .form-group textarea { height: 150px; resize: vertical; }
        .submit-btn { padding: 0.8rem 1.5rem; background-color: var(--accent); border: none; border-radius: 4px; color: var(--text); font-weight: bold; cursor: pointer; transition: all 0.3s ease; }
        .submit-btn:hover { background-color: #e00058; transform: translateY(-2px); }
        .map-container { margin-top: 3rem; height: 300px; width: 100%; border-radius: 10px; overflow: hidden; }
        .map-container iframe { width: 100%; height: 100%; border: 0; }
        footer { background-color: #0a0a0d; padding: 4rem 5% 2rem; }
        .footer-container { display: flex; flex-wrap: wrap; gap: 3rem; margin-bottom: 3rem; }
        .footer-col { flex: 1; min-width: 250px; }
        .footer-col h3 { margin-bottom: 1.5rem; color: var(--accent); }
        .footer-col p { margin-bottom: 1.5rem; opacity: 0.8; }
        .social-links { display: flex; gap: 1rem; }
        .social-links a { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; background-color: rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .social-links a:hover { background-color: var(--accent); transform: translateY(-3px); }
        .quick-links ul { list-style: none; }
        .quick-links li { margin-bottom: 0.8rem; }
        .quick-links a { position: relative; padding-left: 1.5rem; transition: all 0.3s ease; }
        .quick-links a::before { content: '→'; position: absolute; left: 0; transition: all 0.3s ease; }
        .quick-links a:hover { color: var(--accent); padding-left: 1.8rem; }
        .newsletter form { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .newsletter input { flex: 1; min-width: 200px; padding: 0.8rem; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px; background-color: rgba(20, 20, 24, 0.8); color: var(--text); }
        .newsletter button { padding: 0.8rem 1.2rem; background-color: var(--accent); border: none; border-radius: 4px; color: var(--text); cursor: pointer; transition: all 0.3s ease; }
        .newsletter button:hover { background-color: #e00058; }
        .copyright { text-align: center; padding-top: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.1); opacity: 0.7; }
        @media (max-width: 768px) {
            nav { padding: 1rem 5%; }
            .nav-links { position: fixed; top: 70px; left: 0; width: 100%; background-color: rgba(14, 14, 17, 0.95); flex-direction: column; align-items: center; padding: 2rem 0; gap: 1rem; clip-path: polygon(0 0, 100% 0, 100% 0, 0 0); transition: all 0.5s ease-in-out; }
            .nav-links.active { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
            .mobile-menu-btn { display: block; }
            header h1 { font-size: 2.5rem; }
            .countdown-container { flex-wrap: wrap; }
            .countdown-item { flex: 1; min-width: 100px; }
            .player-container { flex-direction: column; align-items: center; text-align: center; padding: 1rem; }
            .now-playing { margin-left: 0; margin-top: 1rem; }
            .about-container, .contact-container { flex-direction: column; }
            .about-image { order: 2; }
            .about-content { order: 1; }
            .gallery-container { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
            .player-container { flex-direction: column; align-items: center; padding: 1.2rem; text-align: center; }
            .now-playing { padding-left: 0; border-left: none; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 1rem; margin-top: 1rem; width: 100%; }
            .player-progress { width: 100%; margin: 1rem 0; }
            .volume-control { margin-left: 0; }
        }
    </style>
</head>

    // --- Language Switching ---
    let currentLang = "en";
    function setLang(lang) {
        currentLang = lang;
        document.documentElement.lang = lang;
        // Update all [data-i18n] elements
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            if (translations[lang][key]) {
                el.textContent = translations[lang][key];
                if (el.hasAttribute("data-text")) el.setAttribute("data-text", translations[lang][key]);
            }
        });
        // About paragraphs
        const about = document.getElementById("about-paragraphs");
        if (about) {
            about.innerHTML = "";
            translations[lang].about_paragraphs.forEach(p => {
                const para = document.createElement("p");
                para.textContent = p;
                about.appendChild(para);
            });
        }
        // Programs
        const programs = document.getElementById("programs");
        if (programs) {
            programs.innerHTML = "";
            translations[lang].programs.forEach(prg => {
                programs.innerHTML += `<div class="program-card">
                    <span class="program-time">${prg.time}</span>
                    <h3>${prg.name}</h3>
                    <p>${prg.desc}</p>
                </div>`;
            });
        }
        // Gallery
        const gallery = document.getElementById("gallery-images");
        if (gallery) {
            gallery.innerHTML = "";
            translations[lang].gallery.forEach(src => {
                gallery.innerHTML += `<div class="gallery-item"><img src="${src}" alt="Event Photo"></div>`;
            });
        }
        // Newsletter placeholder
        const newsletterInput = document.getElementById("newsletter-email");
        if (newsletterInput) {
            newsletterInput.placeholder = lang === "en" ? "Enter your email" : "Introdu email-ul tău";
        }
        // Contact form placeholders
        document.getElementById("name").placeholder = lang === "en" ? "Your name" : "Numele tău";
        document.getElementById("email").placeholder = lang === "en" ? "Your email" : "Email-ul tău";
        document.getElementById("subject").placeholder = lang === "en" ? "Subject" : "Subiect";
        document.getElementById("message").placeholder = lang === "en" ? "Your message" : "Mesajul tău";
        // Update language button state
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
    }
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            setLang(this.dataset.lang);
        });
    });
    setLang("en");

    // --- Mobile Menu ---
    const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
    const navLinks = document.querySelector('.nav-links');
    mobileMenuBtn.addEventListener('click', function() {
        navLinks.classList.toggle('active');
    });
